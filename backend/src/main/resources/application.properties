# MineWars Backend Configuration

# HTTP
quarkus.http.port=8080

# PostgreSQL Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/minewars
quarkus.datasource.username=minewars
quarkus.datasource.password=minewars
quarkus.datasource.devservices.enabled=false

# Connection pool — tolerate slow RDS cold connections
quarkus.datasource.jdbc.acquisition-timeout=30S
quarkus.datasource.jdbc.new-connection-sql=SELECT 1

# Hibernate ORM — Flyway owns schema, Hibernate only validates
quarkus.hibernate-orm.schema-management.strategy=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.connect-retries=3
quarkus.flyway.connect-retries-interval=10S

# JWT
mp.jwt.verify.issuer=minewars
minewars.jwt.expiry=PT24H

# Dev & test: use classpath PEM files - production uses Secrets Manager env vars
%dev.mp.jwt.verify.publickey.location=classpath:publicKey.pem
%dev.smallrye.jwt.sign.key.location=classpath:privateKey.pem
%test.mp.jwt.verify.publickey.location=classpath:publicKey.pem
%test.smallrye.jwt.sign.key.location=classpath:privateKey.pem

# CORS (dev only)
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Authorization

# Native build — include PEM files in the native image
quarkus.native.resources.includes=publicKey.pem,privateKey.pem
