# Deploy — Deploys to AWS after CI passes on main.
# Triggered by workflow_run (CI must succeed). Only one deploy runs at a time.
# Builds backend JAR (skips tests — already passed in CI), frontend dist, then runs CDK deploy.

name: Deploy

permissions:
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            infra/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      # JWT keys: not needed here — production reads them from Secrets Manager (env vars injected by ECS)

      - name: Build backend
        run: ./mvnw package -DskipTests
        working-directory: backend

      - name: Build frontend
        working-directory: frontend
        run: npm ci
        
      - name: Build frontend dist
        working-directory: frontend
        run: npm run build

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra

      - name: Deploy
        run: npx cdk deploy --require-approval never
        working-directory: infra
