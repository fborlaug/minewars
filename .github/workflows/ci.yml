# CI — Build and test on every push/PR to main.
# Backend: Java 25 (non-LTS), PostgreSQL 17, Maven (compile + test + package + verify).
# Frontend: Node 24, npm (install, type-check, build, test).
# Both jobs run in parallel. Pipeline fails if either job fails.

name: CI
permissions:
  contents: read  # read-only — no write access to the repo
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    # PostgreSQL service container for integration tests (port 5433 to match application.properties)
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: minewars
          POSTGRES_USER: minewars
          POSTGRES_PASSWORD: minewars
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # JWT keys are gitignored — generate a throwaway pair for build/tests
      - name: Generate test JWT keys
        run: |
          set -euo pipefail
          openssl genpkey -algorithm RSA -out src/main/resources/privateKey.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -in src/main/resources/privateKey.pem -pubout -out src/main/resources/publicKey.pem
      # verify = compile + test + package + integration tests (against the PostgreSQL service above)
      - run: ./mvnw verify

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci              # clean install from lockfile
      - run: npm run type-check  # vue-tsc — TypeScript compilation check
      - run: npm run build       # vite production build
      - run: npm test            # placeholder until Phase 7
